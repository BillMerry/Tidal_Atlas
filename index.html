<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#12384a">
    <meta name="description" content="Private North Brittany tidal atlas viewer based on High Water Cherbourg.">
    <title>North Brittany Tidal Atlas</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=0.11">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">STEELER private reference</p>
        <h1>North Brittany Tidal Atlas</h1>
      </div>
      <p id="appVersion" class="app-version">v0.11</p>
      <button id="installButton" class="secondary hidden" type="button">Install</button>
    </header>

    <main class="layout">
      <section class="controls" aria-labelledby="hw-heading">
        <form id="planningForm" class="smart-form">
          <label>
            Planning date
            <input id="planningDate" type="date" required>
          </label>
          <button id="loadSmartButton" type="submit">Load tides</button>
          <button id="demoButton" class="secondary hidden" type="button">Test data</button>
        </form>

        <div class="control-row">
          <button id="prevButton" class="secondary" type="button" aria-label="Previous chart">Prev</button>
          <button id="nowButton" class="secondary" type="button">Nearest now</button>
          <button id="nextButton" class="secondary" type="button" aria-label="Next chart">Next</button>
        </div>

        <label class="jump-control">
          Chart
          <select id="chartSelect" aria-label="Jump to chart"></select>
        </label>

        <p id="providerStatus" class="provider-status"></p>

        <details id="manualPanel" class="manual-panel">
          <summary>Manual HW fallback</summary>
          <form id="hwForm" class="hw-form">
            <div id="cycleInputs" class="cycle-inputs"></div>
            <div class="form-actions">
              <button type="submit">Use manual times</button>
              <button id="addCycleButton" class="secondary" type="button">Add HW</button>
            </div>
          </form>
        </details>
      </section>

      <section class="viewer" aria-live="polite">
        <div class="chart-meta">
          <div>
            <p id="offsetLabel" class="offset-label">HW Cherbourg</p>
            <p id="validTime" class="valid-time">Choose a date and time</p>
          </div>
          <div class="reference-block">
            <p id="referenceTime" class="reference-time"></p>
            <p id="coefficientLabel" class="coefficient-label"></p>
            <p id="pageCounter" class="page-counter"></p>
          </div>
        </div>

        <figure id="chartFrame" class="chart-frame">
          <img id="chartImage" alt="Tidal stream chart">
          <figcaption id="chartCaption"></figcaption>
        </figure>
      </section>
    </main>

    <footer class="app-footer">
      <p>For private passage-planning support only. Confirm navigation decisions with official publications and current conditions.</p>
    </footer>

    <script type="module" src="app.js?v=0.11"></script>
  </body>
</html>
